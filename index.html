<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Galaxy Heart</title>
<style>
body {
    margin:0;
    overflow:hidden;
    background:black;
    color:white;
    font-family:Segoe UI;
}
canvas { position:absolute; top:0; left:0; }
.text {
    position:absolute;
    width:100%;
    text-align:center;
    opacity:0;
    transition:opacity 3s;
}
#line1 { top:40%; font-size:28px; }
#line2 { top:48%; font-size:26px; }
#line3 { top:58%; font-size:36px; text-shadow:0 0 20px white; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="line1" class="text">In a universe this infinite...</div>
<div id="line2" class="text">Out of billions of souls...</div>
<div id="line3" class="text">Mine chose you, Armaan 🤍</div>

<script>
window.onload = function() {

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.onresize = resize;

let stars = [];
let heart = [];
let forming = false;
let pulse = 1;

function heartShape(t) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t) - Math.cos(4*t));
    return {x:x, y:y};
}

for (let i=0;i<1200;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        size:Math.random()*1.5
    });
}

for (let t=0;t<Math.PI*2;t+=0.01){
    let p = heartShape(t);
    heart.push({
        x:canvas.width/2 + p.x*18,
        y:canvas.height/2 + p.y*18
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    stars.forEach((star,i)=>{
        if(forming && i<heart.length){
            star.x += (heart[i].x-star.x)*0.03;
            star.y += (heart[i].y-star.y)*0.03;
        }

        ctx.beginPath();
        ctx.arc(star.x,star.y,star.size*pulse,0,Math.PI*2);
        ctx.fillStyle="white";
        ctx.fill();
    });

    requestAnimationFrame(draw);
}

draw();

setInterval(()=>{
    if(forming){
        pulse = pulse===1?1.15:1;
    }
},900);

setTimeout(()=>{
    document.getElementById("line1").style.opacity=1;
},1500);

setTimeout(()=>{
    document.getElementById("line1").style.opacity=0;
    document.getElementById("line2").style.opacity=1;
},4500);

setTimeout(()=>{
    document.getElementById("line2").style.opacity=0;
    forming=true;
},8000);

setTimeout(()=>{
    document.getElementById("line3").style.opacity=1;
},11000);

}
</script>

</body>
</html>
