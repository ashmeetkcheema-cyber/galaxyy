<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Galaxy Heart</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #07091f, #000000);
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

.text {
    position: absolute;
    width: 100%;
    text-align: center;
    opacity: 0;
    transition: opacity 3s ease;
    letter-spacing: 3px;
}

#line1 { top: 35%; font-size: 30px; }
#line2 { top: 43%; font-size: 26px; }
#line3 {
    top: 55%;
    font-size: 40px;
    font-weight: 300;
    text-shadow: 0 0 30px rgba(255,255,255,0.9);
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="line1" class="text">In a universe this infinite...</div>
<div id="line2" class="text">Out of billions of souls...</div>
<div id="line3" class="text">Mine chose you, NAVROSE🤍</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];
let heartPoints = [];
let forming = false;
let pulse = 1;
let zoom = 1;
let shootingStars = [];

// Heart formula
function heartShape(t) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t)
            - 2 * Math.cos(3*t) - Math.cos(4*t));
    return { x: x, y: y };
}

// Create galaxy stars
for (let i = 0; i < 1600; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 1.5,
        speed: Math.random() * 0.4
    });
}

// Create heart coordinates
for (let t = 0; t < Math.PI * 2; t += 0.008) {
    let p = heartShape(t);
    heartPoints.push({
        x: canvas.width / 2 + p.x * 18,
        y: canvas.height / 2 + p.y * 18
    });
}

// Shooting stars
function createShootingStar() {
    shootingStars.push({
        x: Math.random() * canvas.width,
        y: 0,
        length: Math.random() * 100 + 50,
        speed: Math.random() * 8 + 6
    });
}
setInterval(createShootingStar, 2500);

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.scale(zoom, zoom);
    ctx.translate(-canvas.width/2, -canvas.height/2);

    // Draw stars
    stars.forEach((star, i) => {

        star.size += Math.sin(Date.now()*0.002 + i)*0.003;

        if (forming && i < heartPoints.length) {
            star.x += (heartPoints[i].x - star.x) * 0.03;
            star.y += (heartPoints[i].y - star.y) * 0.03;
        } else {
            star.y += star.speed;
            if (star.y > canvas.height) star.y = 0;
        }

        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size * pulse, 0, Math.PI*2);
        ctx.fillStyle = "white";
        ctx.fill();
    });

    // Shooting stars
    shootingStars.forEach((s, index) => {
        ctx.beginPath();
        ctx.moveTo(s.x, s.y);
        ctx.lineTo(s.x - s.length, s.y + s.length);
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.stroke();

        s.x += s.speed;
        s.y += s.speed;

        if (s.y > canvas.height) {
            shootingStars.splice(index,1);
        }
    });

    ctx.restore();
    requestAnimationFrame(draw);
}

draw();

// Heart pulse
setInterval(() => {
    if (forming) {
        pulse = pulse === 1 ? 1.2 : 1;
    }
}, 900);

// Slow cinematic zoom
setInterval(() => {
    if (forming && zoom < 1.3) {
        zoom += 0.002;
    }
}, 30);

// Text timing
setTimeout(() => {
    document.getElementById("line1").style.opacity = 1;
}, 1500);

setTimeout(() => {
    document.getElementById("line1").style.opacity = 0;
    document.getElementById("line2").style.opacity = 1;
}, 5000);

setTimeout(() => {
    document.getElementById("line2").style.opacity = 0;
    forming = true;
}, 8500);

setTimeout(() => {
    document.getElementById("line3").style.opacity = 1;
}, 11500);

</script>

</body>
</html>
